# Active CI workflow.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  RUSTUP_TOOLCHAIN: 1.93.0

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          cache: npm
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal --component clippy --component rustfmt
      - run: npm ci
      - run: npm run check:studio
      - run: npm run check:docs
      - run: npm run build
      - run: node scripts/release/contract-test.mjs
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked --all-targets
      - run: cargo clippy --locked --features desktop --bin neuman-desktop -- -D warnings
      - run: cargo test --locked --features desktop --bin neuman-desktop
